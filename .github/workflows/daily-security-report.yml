name: Daily Security Alerts Report

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC daily — change as needed
  workflow_dispatch:

jobs:
  generate-security-report:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      # Security events are covered by the PAT

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Full Security Report
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.SECURITY_REPORT_PAT }}
          script: |
            const fs = require('fs');
            const scriptPath = '.github/scripts/generate-security-report.js';
            
            if (fs.existsSync(scriptPath)) {
              console.log('📄 Loading full report script...');
              const { generateReport } = require(scriptPath);
              await generateReport(github, context, core);
            } else {
              console.log('⚠️ Full script not found, using fallback...');
              const today = new Date().toISOString().split('T')[0];
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Daily Security Alerts Report - ${today}`,
                body: 'Full script not found yet. Please ensure .github/scripts/generate-security-report.js exists.',
                labels: ['security', 'daily-report', 'alerts']
              });
            }