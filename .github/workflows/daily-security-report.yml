name: Daily Security Alerts Report

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC daily — change as needed
  workflow_dispatch:

jobs:
  generate-security-report:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Full Security Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SECURITY_REPORT_PAT }}
          script: |
            const fs = require('fs');
            const scriptPath = '.github/scripts/generate-security-report.js';
            if (fs.existsSync(scriptPath)) {
              const { generateReport } = require(scriptPath);
              await generateReport(github);
            } else {
              // Fallback to inline placeholder if script missing
              const today = new Date().toISOString().split('T')[0];
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Daily Security Alerts Report - ${today}`,
                body: 'Full script not found yet. Please add .github/scripts/generate-security-report.js',
                labels: ['security', 'daily-report', 'alerts']
              });
            }